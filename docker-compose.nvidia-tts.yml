# Переопределение для запуска Qwen3 в Docker (опционально).
# Использование: docker compose -f docker-compose.yml -f docker-compose.nvidia-tts.yml --profile nvidia-tts up -d
# Поднимает tts-qwen3; Stage4 обращается к нему по http://tts-qwen3:8020 (вместо хоста).
services:
  stage4:
    environment:
      EXTERNAL_TTS_QWEN3_URL: http://tts-qwen3:8020
