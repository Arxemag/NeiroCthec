services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: neuro
      POSTGRES_PASSWORD: neuro
      POSTGRES_DB: neurochtec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuro -d neurochtec"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data


  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://neuro:neuro@postgres:5432/neurochtec?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 2592000
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: neurochtec-audio
      FREE_MAX_CHARS_PER_REQUEST: 6000
      FREE_MAX_REQUESTS_PER_DAY: 5
    command: ["sh", "-c", "npm exec -w apps/api prisma migrate deploy && node apps/api/dist/src/main.js"]
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      api:
        condition: service_started
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://neuro:neuro@postgres:5432/neurochtec?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 2592000
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: neurochtec-audio
      FREE_MAX_CHARS_PER_REQUEST: 6000
      FREE_MAX_REQUESTS_PER_DAY: 5
    command: ["node", "apps/api/dist/src/worker.js"]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
