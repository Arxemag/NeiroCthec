# НейроЧтец — единый запуск всего стека из корня проекта.
# Запуск: docker compose up -d
# XTTS2 — в пуле по умолчанию (tts-xtts:8021). Qwen3 — локально на 8020 или в Docker с профилем nvidia-tts.

services:
  # --- Инфраструктура (Postgres, Redis, MinIO) ---
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: neuro
      POSTGRES_PASSWORD: neuro
      POSTGRES_DB: neurochtec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # --- Backend (Core API + Stage4) ---
  core:
    build:
      context: ./app
      dockerfile: Dockerfile.core
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - ./app/storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - APP_STORAGE_ROOT=/app/storage

  stage4:
    build:
      context: ./app
      dockerfile: Dockerfile.core
    depends_on:
      - core
      - tts-xtts
    environment:
      - CORE_INTERNAL_URL=http://core:8000/internal
      - STAGE4_SYNTH_MODE=external
      - EXTERNAL_TTS_QWEN3_URL=http://host.docker.internal:8020
      - EXTERNAL_TTS_XTTS_URL=http://tts-xtts:8021
      # XTTS на CPU медленный: один запрос может занимать 1–3 мин, увеличиваем таймаут
      - EXTERNAL_TTS_TIMEOUT_SEC=300
      - APP_STORAGE_ROOT=/app/storage
    volumes:
      - ./app:/app
      - ./app/storage:/app/storage
    command: ["python", "-m", "stage4_service.app"]
    deploy:
      # При XTTS на CPU лучше 1 реплика, иначе tts-xtts не успевает и даёт 503/обрывы
      replicas: 1
      # Для большего числа воркеров: docker compose up -d --scale stage4=4

  # --- TTS Qwen3 (NVIDIA). Не поднимать на AMD — там TTS локально на 8020. ---
  tts-qwen3:
    build:
      context: ./app
      dockerfile: Dockerfile
    runtime: nvidia
    ports:
      - "8020:8020"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TTS_ENGINE_PORT=8020
    volumes:
      - ./app/storage:/app/storage
      - tts_cache:/root/.cache/tts
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - nvidia-tts

  # --- TTS XTTS2 (NVIDIA GPU). Порт 8021. Входит в стандартный пул. ---
  tts-xtts:
    build:
      context: ./app
      dockerfile: Dockerfile.xtts
    runtime: nvidia
    ports:
      - "8021:8021"
    environment:
      - COQUI_TOS_AGREED=1
      - TTS_USE_GPU=false
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TTS_ENGINE_PORT=8021
      # Раскомментируйте для проверки без чанкинга (один вызов tts_to_file на весь текст):
      - TTS_XTTS_SINGLE_CHUNK=1
    volumes:
      - ./app/storage:/app/storage
      - tts_xtts_cache:/root/.cache/tts
      - tts_xtts_data:/root/.local/share/tts
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- Frontend: один раз ставим зависимости (frontend_deps), затем api/worker/web только запускают скрипты ---
  frontend_deps:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    command: sh -c "rm -rf node_modules apps/api/node_modules apps/web/node_modules 2>/dev/null; npm install && npm run -w apps/api prisma:generate"

  api:
    image: node:20
    working_dir: /usr/src/app
    command: sh -c "npm run -w apps/api prisma:migrate:deploy && npm run -w apps/api dev"
    ports:
      - "4000:4000"
    env_file:
      - ./frontend/apps/api/.env
    environment:
      - DATABASE_URL=postgresql://neuro:neuro@postgres:5432/neurochtec?schema=public
      - S3_ENDPOINT=http://minio:9000
      - REDIS_URL=redis://redis:6379
      - APP_API_URL=http://core:8000
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    depends_on:
      frontend_deps: { condition: service_completed_successfully }
      postgres: { condition: service_started }
      redis: { condition: service_started }
      minio: { condition: service_started }

  worker:
    image: node:20
    working_dir: /usr/src/app
    command: sh -c "npm run -w apps/api worker"
    env_file:
      - ./frontend/apps/api/.env
    environment:
      - DATABASE_URL=postgresql://neuro:neuro@postgres:5432/neurochtec?schema=public
      - S3_ENDPOINT=http://minio:9000
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    depends_on:
      frontend_deps: { condition: service_completed_successfully }
      postgres: { condition: service_started }
      redis: { condition: service_started }
      minio: { condition: service_started }

  web:
    image: node:20
    working_dir: /usr/src/app
    command: sh -c "npm run -w apps/web dev"
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/apps/web/.env
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
      - frontend_web_next:/usr/src/app/apps/web/.next
    depends_on:
      frontend_deps: { condition: service_completed_successfully }
      api: { condition: service_started }

volumes:
  pgdata:
  miniodata:
  tts_cache:
  tts_xtts_cache:
  tts_xtts_data:
  frontend_node_modules:
  frontend_web_next:
