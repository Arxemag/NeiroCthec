services:
  # Frontend stack (Next + Nest)
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: neuro
      POSTGRES_PASSWORD: neuro
      POSTGRES_DB: neurochtec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuro -d neurochtec"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api-migrate:
    build:
      context: ./frontend
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://neuro:neuro@postgres:5432/neurochtec?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 2592000
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: neurochtec-audio
      FREE_MAX_CHARS_PER_REQUEST: 6000
      FREE_MAX_REQUESTS_PER_DAY: 5
    restart: "no"
    command: ["npx", "prisma", "migrate", "deploy", "--schema=apps/api/prisma/schema.prisma"]

  api:
    build:
      context: ./frontend
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      api-migrate:
        condition: service_completed_successfully
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://neuro:neuro@postgres:5432/neurochtec?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 2592000
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: neurochtec-audio
      FREE_MAX_CHARS_PER_REQUEST: 6000
      FREE_MAX_REQUESTS_PER_DAY: 5
    ports:
      - "4000:4000"

  worker:
    build:
      context: ./frontend
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      api-migrate:
        condition: service_completed_successfully
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://neuro:neuro@postgres:5432/neurochtec?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 2592000
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: neurochtec-audio
      FREE_MAX_CHARS_PER_REQUEST: 6000
      FREE_MAX_REQUESTS_PER_DAY: 5
    command: ["node", "apps/api/dist/src/worker.js"]

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.web
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    ports:
      - "3000:3000"

  # Core python backend stack (FastAPI + Stage4 TTS)
  py-postgres:
    profiles: ["python-backend"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neiro
      POSTGRES_PASSWORD: neiro
      POSTGRES_DB: neirocthec
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neiro -d neirocthec"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - py_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    profiles: ["python-backend"]
    build:
      context: ./app
      dockerfile: Dockerfile.api
    command: python3 -m uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg2://neiro:neiro@py-postgres:5432/neirocthec
      STAGE4_TTS_URL: http://stage4-tts:8010
    volumes:
      - ./app:/app
      - ./app/storage:/app/storage
    depends_on:
      py-postgres:
        condition: service_healthy
      stage4-tts:
        condition: service_started
    ports:
      - "8000:8000"

  stage4-tts:
    profiles: ["python-backend"]
    build:
      context: ./app
      dockerfile: stage4_service/Dockerfile
    environment:
      CORE_INTERNAL_URL: http://backend:8000/internal
      STAGE4_MAX_GPU_JOBS: 1
      STAGE4_WORKERS: 1
      STAGE4_OBJECT_ROOT: /srv/storage/object
      STAGE4_OBJECT_URI_PREFIX: s3://audio
    command: python3 -m uvicorn stage4_service.app:app --host 0.0.0.0 --port 8010 --reload
    volumes:
      - ./app:/srv
      - ./app/storage:/srv/storage
    ports:
      - "8010:8010"

volumes:
  pgdata:
  miniodata:
  py_postgres_data:
