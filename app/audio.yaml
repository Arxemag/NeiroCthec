engine:
  # Тип используемой TTS-модели
  # XTTS v2 — мощная мультисpeaker, multilingual модель от Coqui AI
  # Поддерживает zero-shot синтез по образцу голоса (.wav)
  type: xtts_v2

  # Язык, на котором генерируется речь
  # Должен соответствовать языку обучающих данных модели (ru = русский)
  language: ru

  # Устройство для инференса: cpu, cuda (GPU), или auto
  # auto — автоматически выберет доступное устройство (GPU если есть)
  device: auto

paths:
  # Основная папка, куда сохраняются все аудиофайлы
  # Используется в пайплайне при записи сегментов и финального файла
  output_dir: storage/audio

voices:
  # Пути к аудиофайлам-образцам голосов (speaker embeddings)
  # Формат: .wav, моно, 16-бит, 22050 Гц — идеально для XTTS
  narrator: storage/voices/narrator.wav  # повествование
  male:     storage/voices/male.wav      # мужские реплики
  female:   storage/voices/female.wav    # женские реплики

xtts:
  # Температура генерации — контролирует "случайность" выбора следующего токена
  # Чем выше — тем более креативный, но менее предсказуемый результат
  # Слишком высокое значение → шум, артефакты. Рекомендуется: 0.5–0.8
  temperature: 0.7

  # Top-k фильтрация — ограничивает выбор только k наиболее вероятных токенов
  # Высокое значение (например, 50) = больше вариантов → естественнее
  # Низкое (например, 10) = консервативнее, но может быть "роботизированно"
  top_k: 30

  # Top-p (nucleus sampling) — выбирает из наименьшего набора токенов, чья суммарная вероятность >= p
  # 0.85 означает, что берутся токены, составляющие 85% вероятностной массы
  # Более гибкий подход, чем top-k. Обычно используется вместе
  top_p: 0.85

  # Штраф за повторение — подавляет повторение одних и тех же слов/фраз
  # Значение > 1.0 — увеличивает штраф (слишком высокое → "зацикливание" пропадает, но теряется естественность)
  # Значение < 1.0 — разрешает повторы (не рекомендуется)
  # Оптимально: 1.8–3.0. У вас 2.8 — хороший баланс
  repetition_penalty: 2.8

  # Базовая скорость речи
  # 1.0 — нормальная скорость
  # > 1.0 — быстрее (1.05 = на 5% быстрее)
  # < 1.0 — медленнее (0.9 = размеренная речь)
  # Не влияет на pitch, только на длительность
  speed_base: 1.05

  # Опционально: если ваш пайплайн поддерживает динамическое изменение скорости
  # speed_variance: 0.05  # добавляет небольшой "дрожь" в темп для живости

pauses:
  # Пауза между строками текста (в миллисекундах)
  # Используется после каждой логической строки (например, после реплики)
  # 400–600 мс — естественно для разговорной речи
  line_pause_ms: 500

  # Максимальная длина паузы, которую можно вставить (в мс)
  # Используется в алгоритмах расстановки пауз (например, по знакам препинания)
  # Например, многоточие может давать паузу до max_pause_ms
  # Обычно 1500–3000 мс. У вас 2500 — разумно для драматических пауз
  max_pause_ms: 2500