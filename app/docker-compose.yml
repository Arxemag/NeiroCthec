# Core API и TTS в Docker. Запуск: из папки app/ выполнить docker compose up -d [core] [tts]
version: '3.8'

services:
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1

  tts:
    build:
      context: .
      dockerfile: Dockerfile
    runtime: nvidia
    ports:
      - "8020:8020"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TTS_ENGINE_PORT=8020
    volumes:
      - ./storage:/app/storage
      - tts_cache:/root/.cache/tts
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  tts_cache: