# TTS Qwen3 в Docker (NVIDIA GPU). Запуск: из папки app/ выполнить docker compose up -d tts
version: '3.8'

services:
  tts:
    build:
      context: .
      dockerfile: Dockerfile
    runtime: nvidia
    ports:
      - "8020:8020"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TTS_ENGINE_PORT=8020
    volumes:
      - ./storage:/app/storage
      - tts_cache:/root/.cache/tts
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  tts_cache: