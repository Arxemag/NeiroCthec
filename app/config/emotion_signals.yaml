limits:
  energy: [0.5, 1.5]
  tempo: [0.7, 1.3]
  pitch: [-0.5, 0.5]
  pause: [0, 2000]

remark_signals:
  # громкость / напряжение
  крик:
    energy: 0.4
    tempo: 0.3
    pitch: 0.3

  вскрик:
    energy: 0.35
    tempo: 0.25
    pitch: 0.25

  вопль:
    energy: 0.45
    tempo: 0.35
    pitch: 0.35

  # тихо
  шеп:
    energy: -0.3
    tempo: -0.2
    pitch: -0.2

  тихо:
    energy: -0.2
    tempo: -0.15
    pitch: -0.1

  # эмоции
  сме:
    energy: 0.25
    tempo: 0.15
    pitch: 0.2

  усмех:
    energy: 0.15
    tempo: 0.05
    pitch: 0.1

  # паузы
  вздох:
    pause_before: 300

  задум:
    tempo: -0.2
    pause_before: 250

  # страх / напряжение
  дрож:
    tempo: -0.1
    pitch: -0.1

  испуг:
    energy: 0.2
    tempo: 0.3
    pitch: 0.25
